          - "test/mos_cpu.bats::LDA absolute loads from full 16-bit address"
          - "test/mos_cpu.bats::LDA zero-page X-indexed loads from zpg+X"
          - "test/mos_cpu.bats::LDA absolute X-indexed loads from abs+X"
          - "test/mos_cpu.bats::LDA absolute Y-indexed loads from abs+Y"
          - "test/mos_cpu.bats::LDX immediate loads value into X"
          - "test/mos_cpu.bats::LDX zero-page loads from memory"
          - "test/mos_cpu.bats::LDX absolute loads from full 16-bit address"
          - "test/mos_cpu.bats::LDY immediate loads value into Y"
          - "test/mos_cpu.bats::LDY zero-page loads from memory"
          - "test/mos_cpu.bats::LDY absolute loads from full 16-bit address"
          - "test/mos_cpu.bats::STX stores X to zero-page"
          - "test/mos_cpu.bats::STY stores Y to zero-page"
          - "test/mos_cpu.bats::STZ zero-page stores zero"
          - "test/mos_cpu.bats::STZ absolute stores zero"
          - "test/mos_cpu.bats::LDA #$80 sets N flag; LDA #$40 clears N flag"
          - "test/mos_cpu.bats::LDA #$00 sets Z flag; LDA #$01 clears Z flag"

      - section: "5.2"
        title: Register Transfers
        testable: true
        tests:
          - "test/mos_cpu.bats::TAX copies A to X and sets N/Z flags"
          - "test/mos_cpu.bats::TXA copies X to A and sets N/Z flags"
          - "test/mos_cpu.bats::TAY copies A to Y"
          - "test/mos_cpu.bats::TYA copies Y to A"
          - "test/mos_cpu.bats::TSX copies S to X and sets N/Z flags"
          - "test/mos_cpu.bats::TXS copies X to S without affecting flags"

      - section: "5.3"
        title: Stack Operations
        testable: true
        tests:
          - "test/mos_cpu.bats::PHA/PLA round-trip preserves value"
          - "test/mos_cpu.bats::PHX/PLX round-trip preserves value"
          - "test/mos_cpu.bats::PHY/PLY round-trip preserves value"
          - "test/mos_cpu.bats::PHP/PLP round-trip preserves P"
          - "test/mos_cpu.bats::multiple pushes stack in LIFO order"
          - "test/mos_cpu.bats::S decrements on push and increments on pull"

      - section: "5.4"
        title: Arithmetic
        testable: true
        tests:
          - "test/mos_cpu.bats::ADC basic addition without carry"
          - "test/mos_cpu.bats::ADC with carry-in adds 1 extra"
          - "test/mos_cpu.bats::ADC carry-out sets C flag"
          - "test/mos_cpu.bats::ADC overflow sets V flag ($7F + $01)"
          - "test/mos_cpu.bats::ADC result $00 sets Z flag"
          - "test/mos_cpu.bats::ADC result with bit 7 set sets N flag"
          - "test/mos_cpu.bats::SBC basic subtraction"
          - "test/mos_cpu.bats::SBC borrow clears C flag"
          - "test/mos_cpu.bats::SBC overflow $80 - $01 sets V flag"
          - "test/mos_cpu.bats::INX increments X by 1"
          - "test/mos_cpu.bats::INX wraps $FF to $00 and sets Z"
          - "test/mos_cpu.bats::INY increments Y by 1"
          - "test/mos_cpu.bats::DEX decrements X by 1"
          - "test/mos_cpu.bats::DEX wraps $00 to $FF and sets N"
          - "test/mos_cpu.bats::DEY decrements Y by 1"
          - "test/mos_cpu.bats::INC zero-page increments memory and sets Z on $FF->$00"
          - "test/mos_cpu.bats::DEC zero-page decrements memory"

      - section: "5.5"
        title: Compare
        testable: true
        tests:
          - "test/mos_cpu.bats::CMP equal: Z=1 C=1 N=0; register unchanged"
          - "test/mos_cpu.bats::CMP greater: Z=0 C=1 N=0"
          - "test/mos_cpu.bats::CMP less: Z=0 C=0 N=1"
          - "test/mos_cpu.bats::CPX equal sets Z and C flags"
          - "test/mos_cpu.bats::CPX greater: Z=0 C=1 N=0"
          - "test/mos_cpu.bats::CPX less: Z=0 C=0 N=1"
          - "test/mos_cpu.bats::CPY equal sets Z and C flags"
          - "test/mos_cpu.bats::CPY greater: Z=0 C=1 N=0"
          - "test/mos_cpu.bats::CPY less: Z=0 C=0 N=1"
          - "test/mos_cpu.bats::CMP does not modify the compared register"

      - section: "5.6"
        title: Bitwise and Shift
        testable: true
        tests:
          - "test/mos_cpu.bats::AND masks bits correctly"
          - "test/mos_cpu.bats::AND result $00 sets Z flag"
          - "test/mos_cpu.bats::ORA sets bits correctly"
          - "test/mos_cpu.bats::ORA result with bit 7 set sets N flag"
          - "test/mos_cpu.bats::EOR flips bits correctly"
          - "test/mos_cpu.bats::EOR self-XOR produces $00 and sets Z flag"
          - "test/mos_cpu.bats::ASL accumulator shifts left; old bit 7 goes to C"
          - "test/mos_cpu.bats::LSR accumulator shifts right; old bit 0 goes to C"
          - "test/mos_cpu.bats::ROL accumulator rotates left through C"
          - "test/mos_cpu.bats::ROR accumulator rotates right through C"
          - "test/mos_cpu.bats::ASL zero-page shifts memory byte left"
          - "test/mos_cpu.bats::LSR zero-page shifts memory byte right"
          - "test/mos_cpu.bats::ASL twice equals multiply by 4"
          - "test/mos_cpu.bats::ROL/ROR round-trip restores original value"
          - "test/mos_cpu.bats::ROL/ROR round-trip on zero-page memory restores original value"
          - "test/mos_cpu.bats::BIT immediate: Z set when A AND imm == 0"
          - "test/mos_cpu.bats::BIT zero-page: N/V copied from bits 7/6 of memory"
          - "test/mos_cpu.bats::BIT zero-page: Z set when A AND M == 0"
          - "test/mos_cpu.bats::BIT absolute: N/V copied from bits 7/6 of memory"
          - "test/mos_cpu.bats::TSB sets bits in memory that are set in A"
          - "test/mos_cpu.bats::TRB clears bits in memory that are set in A"

      - section: "5.7"
        title: Branch
        testable: true
        tests:
          - "test/mos_cpu.bats::BEQ taken when Z=1: skips alternate path"
          - "test/mos_cpu.bats::BEQ not-taken when Z=0: falls through"
          - "test/mos_cpu.bats::BNE taken when Z=0: skips alternate path"
          - "test/mos_cpu.bats::BNE not-taken when Z=1: falls through"
          - "test/mos_cpu.bats::BCC taken when C=0"
          - "test/mos_cpu.bats::BCC not-taken when C=1"
          - "test/mos_cpu.bats::BCS taken when C=1"
          - "test/mos_cpu.bats::BCS not-taken when C=0"
          - "test/mos_cpu.bats::BMI taken when N=1"
          - "test/mos_cpu.bats::BMI not-taken when N=0"
          - "test/mos_cpu.bats::BPL taken when N=0"
          - "test/mos_cpu.bats::BPL not-taken when N=1"
          - "test/mos_cpu.bats::BVC taken when V=0"
          - "test/mos_cpu.bats::BVC not-taken when V=1"
          - "test/mos_cpu.bats::BVS taken when V=1"
          - "test/mos_cpu.bats::BVS not-taken when V=0"
          - "test/mos_cpu.bats::BRA always branches unconditionally"
          - "test/mos_cpu.bats::backward branch: loop counts down to zero"

      - section: "5.8"
        title: Jump and Call
        testable: true
        tests:
          - "test/mos_cpu.bats::JMP absolute moves PC to target"
          - "test/mos_cpu.bats::JMP indirect dereferences pointer"
          - "test/mos_cpu.bats::JSR jumps to subroutine; RTS returns"
          - "test/mos_cpu.bats::nested JSR/RTS unwinds stack correctly"
          - "test/mos_cpu.bats::S decrements by 2 on JSR and increments by 2 on RTS"

      - section: "5.9"
        title: Interrupt and Break
        testable: true
        tests:
          # BRK is not directly testable in this harness: the Apple II ROM
          # owns the interrupt vector at $FFFE/$FFFF and its BRK handler
          # cannot be overridden from assembly in the disk image.
          - "test/mos_cpu.bats::RTI restores PC from stack: jumps past trap to success code"
          - "test/mos_cpu.bats::RTI restores P flags from stack"

      - section: "5.10"
        title: Status Flag Operations
        testable: true
        tests:
          - "test/mos_cpu.bats::CLC clears C; SEC sets C"
          - "test/mos_cpu.bats::CLV clears V after overflow sets it"
          - "test/mos_cpu.bats::SEI sets I flag; CLI clears I flag"
          - "test/mos_cpu.bats::SED sets D flag; CLD clears D flag"

      - section: "5.11"
        title: No Operation
        testable: true
        tests:
          - "test/mos_cpu.bats::NOP does not affect registers or memory"

