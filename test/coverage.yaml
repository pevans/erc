  - spec: spec-5
    title: Mini Assembler
    sections:
      - section: "1"
        title: Overview
        testable: false

      - section: "2"
        title: Scope
        testable: false

      - section: "3"
        title: Source Format
        testable: false

      - section: "3.1"
        title: Lines
        testable: true
        tests:
          - "test/assembler.bats::valid program exits with status 0"
          - "test/assembler.bats::blank lines are ignored"

      - section: "3.2"
        title: Comments
        testable: true
        tests:
          - "test/assembler.bats::comments are ignored"

      - section: "3.3"
        title: Labels
        testable: true
        tests:
          - "test/assembler.bats::label on its own line sets address for next instruction"
          - "test/assembler.bats::forward branch label resolves to correct relative offset"
          - "test/assembler.bats::backward branch label resolves to correct negative relative offset"
          - "test/assembler.bats::JMP to label uses absolute addressing"
          - "test/assembler.bats::duplicate label exits with non-zero status"
          - "test/assembler.bats::duplicate label error message mentions duplicate"

      - section: "3.4"
        title: Identifiers as Operands
        testable: true
        tests:
          - "test/assembler.bats::forward branch label resolves to correct relative offset"
          - "test/assembler.bats::backward branch label resolves to correct negative relative offset"
          - "test/assembler.bats::JMP to label uses absolute addressing"
          - "test/assembler.bats::undefined label reference exits with non-zero status"
          - "test/assembler.bats::undefined label error message mentions undefined"

      - section: "4"
        title: Instructions
        testable: false

      - section: "4.1"
        title: Addressing Modes
        testable: true
        tests:
          - "test/assembler.bats::immediate mode: LDA #$FF"
          - "test/assembler.bats::zero page mode: LDA $10"
          - "test/assembler.bats::four-digit hex forces absolute mode: LDA $0010"
          - "test/assembler.bats::implied mode: NOP"
          - "test/assembler.bats::implied mode: CLC"
          - "test/assembler.bats::accumulator mode: ASL A"
          - "test/assembler.bats::absolute X-indexed mode: LDA $0400,X"
          - "test/assembler.bats::zero page X-indexed mode: LDA $10,X"
          - "test/assembler.bats::absolute indirect mode: JMP ($FFFC)"
          - "test/assembler.bats::X-indexed indirect mode: LDA ($10,X)"
          - "test/assembler.bats::indirect Y-indexed mode: LDA ($10),Y"
          - "test/assembler.bats::zero page indirect mode: LDA ($10)"
          - "test/assembler.bats::forward branch label resolves to correct relative offset"
          - "test/assembler.bats::backward branch label resolves to correct negative relative offset"
          - "test/assembler.bats::branch target out of range exits with non-zero status"
          - "test/assembler.bats::branch target out of range error message mentions range"

      - section: "4.2"
        title: Accumulator Disambiguation
        testable: true
        tests:
          - "test/assembler.bats::accumulator mode: ASL A"
          - "test/assembler.bats::accumulator mode: ASL with no operand"

      - section: "5"
        title: Directives
        testable: false

      - section: "5.1"
        title: .byte
        testable: true
        tests:
          - "test/assembler.bats::.byte emits the specified bytes"

      - section: "5.2"
        title: .word
        testable: true
        tests:
          - "test/assembler.bats::.word emits 16-bit values in little-endian order"

      - section: "5.3"
        title: .org
        testable: true
        tests:
          - "test/assembler.bats::.org changes the assembly origin"

      - section: "5.4"
        title: .halt
        testable: true
        tests:
          - "test/assembler.bats::.halt emits JMP to current address"

      - section: "6"
        title: Assembly Process
        testable: false

      - section: "6.1"
        title: Two-Pass Assembly
        testable: true
        tests:
          # Forward label reference proves pass 1 records labels before pass 2
          # resolves them
          - "test/assembler.bats::forward branch label resolves to correct relative offset"
          - "test/assembler.bats::JMP to label uses absolute addressing"

      - section: "6.2"
        title: Error Reporting
        testable: true
        tests:
          - "test/assembler.bats::unknown mnemonic exits with non-zero status"
          - "test/assembler.bats::unknown mnemonic error message includes filename and line number"
          - "test/assembler.bats::duplicate label exits with non-zero status"
          - "test/assembler.bats::duplicate label error message mentions duplicate"
          - "test/assembler.bats::undefined label reference exits with non-zero status"
          - "test/assembler.bats::undefined label error message mentions undefined"
          - "test/assembler.bats::branch target out of range exits with non-zero status"
          - "test/assembler.bats::branch target out of range error message mentions range"

      - section: "7"
        title: Disk Image Output
        testable: false

      - section: "7.1"
        title: Layout
        testable: true
        tests:
          - "test/assembler.bats::output is exactly 143360 bytes"
          - "test/assembler.bats::small program sets sector count to 1"
          - "test/assembler.bats::256-byte program sets sector count to 2"

      - section: "7.2"
        title: Sector Interleaving
        testable: true
        tests:
          # Correct byte values at specific dsk offsets proves the interleave
          # is applied correctly
          - "test/assembler.bats::.halt emits JMP to current address"
          - "test/assembler.bats::immediate mode: LDA #$FF"
          - "test/assembler.bats::zero page mode: LDA $10"

      - section: "7.3"
        title: Size Limit
        testable: false

      - section: "8"
        title: Interface
        testable: true
        tests:
          - "test/assembler.bats::valid program exits with status 0"
          - "test/assembler.bats::stdin input via - produces correct output"
          - "test/assembler.bats::stdout output when -o is omitted"
          - "test/assembler.bats::unknown mnemonic exits with non-zero status"
          - "test/assembler.bats::lowercase mnemonics are accepted"

      - section: "9"
        title: Design Considerations
        testable: false

      - section: "9.1"
        title: Opcode Table
        testable: false

      - section: "9.2"
        title: No Macro System
        testable: false

      - section: "9.3"
        title: Relationship to Existing Packages
        testable: false

      - section: "9.4"
        title: Test Disk Workflow
        testable: false
